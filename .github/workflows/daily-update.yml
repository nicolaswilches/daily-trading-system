name: Daily data refresh

on:
  # Runs daily at 22:00 UTC (≈ 30 min after NYSE close). Adjust if needed.
  schedule:
    - cron: "0 22 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install project deps
        run: uv sync --frozen

      - name: Fetch raw data (SimFin)
        env:
          SIMFIN_API_KEY: ${{ secrets.SIMFIN_API_KEY }}
        run: uv run python -m src.fetch_data

      - name: Run ETL
        run: uv run python -m src.etl

      - name: Generate web JSON artifacts
        run: uv run python scripts/generate_web_data.py

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add web/public/data/*.json
          if git diff --staged --quiet; then
            echo "No data changes"
          else
            git commit -m "chore(data): daily refresh [skip ci]"
            git push
          fi
